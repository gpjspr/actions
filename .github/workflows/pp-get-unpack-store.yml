---
name: 'Get Unpack Store Solution'
permissions: 
  id-token: write
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      solutionname:
        description: 'The power platform solution name'
        required: false
        default: UkCustomsApp
        type: string
      major:
        description: 'The major version (the first solution number). If left blank, the current major version will be used.'
        required: false
        type: number
      minor:
        description: 'The minor version (the second solution number). If left blank, the current minor version will be used.'
        required: false
        type: number
jobs:

  prepare:
    name: 'Prepare environment variables'
    runs-on: ubuntu-latest
    environment: DEV
    outputs:
      pp_env_url: ${{ steps.set.outputs.pp_env_url }}

    steps:
      - id: set
        run: |
          echo "pp_env_url=${{ vars.PP_ENV_URL }}" >> $GITHUB_OUTPUT
          
  export-solution-remote-job:
    name: Get Unpack
    needs: prepare
    uses: gpjspr/gpj-common/.github/workflows/pp-get-unpack-store-bsispdev.yml@main
    with:
      solutionname: ${{ inputs.solutionname}}
      major: ${{inputs.major}}
      minor: ${{inputs.minor}}
      pp_env_url: ${{ needs.prepare.outputs.pp_env_url }}
      
  # download-artifacts:
  #  name: Download app artifacts
  #  runs-on: ubuntu-latest
  #  needs: export-solution-remote-job
  #
  #  steps:
  #    - uses: actions/download-artifact@v4
  #      with:
  #        name: appsource
  #        path: src/appsource
        
  lint-canvasapps-remote-job:
    name: Check Canvas Apps
    uses: gpjspr/gpj-common/.github/workflows/pp-canvasapp-lint.yml@main
    with:
      fail-on-errors: false
      root: src/appsource
  #  needs: download-artifacts
      needs: export-solution-remote-job

