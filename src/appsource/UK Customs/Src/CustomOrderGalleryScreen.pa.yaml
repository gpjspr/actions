Screens:
  CustomOrderGalleryScreen:
    Properties:
      OnVisible: |+
        =Set(CurrentOrderItem,Blank());
        Reset(gal_intake_ifgs_1);
        UpdateContext({screentitle:"All Items"});
    Children:
      - cnt_layouts_ifgs_1:
          Control: GroupContainer@1.4.0
          Variant: AutoLayout
          Properties:
            Fill: =RGBA(245, 245, 245, 1)
            Height: =Parent.Height
            LayoutAlignItems: =LayoutAlignItems.Stretch
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =16
            PaddingBottom: =16
            PaddingLeft: =16
            PaddingRight: =16
            PaddingTop: =16
            Width: =Parent.Width
          Children:
            - cnt_hdr_ifgs_1:
                Control: GroupContainer@1.4.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  FillPortions: =0
                  Height: =75
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutMinHeight: =16
                  LayoutMinWidth: =16
                  PaddingBottom: =8
                  PaddingLeft: =8
                  PaddingRight: =8
                  PaddingTop: =8
                Children:
                  - btn_home_ifgs_1:
                      Control: Button@0.0.45
                      Properties:
                        Appearance: ='ButtonCanvas.Appearance'.Outline
                        Height: =Parent.Height - 16
                        Icon: ="Home"
                        IconStyle: ='ButtonCanvas.IconStyle'.Outline
                        Layout: ='ButtonCanvas.Layout'.IconOnly
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        OnSelect: =Navigate(HomeScreen)
                        Width: =Parent.Height -16
                  - cnt_hdr_spacer_ifgs_1:
                      Control: GroupContainer@1.4.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        PaddingBottom: =8
                        PaddingLeft: =8
                        PaddingRight: =8
                        PaddingTop: =8
                      Children:
                        - txt_header_ifgs_1:
                            Control: Text@0.0.51
                            Properties:
                              AlignInContainer: =AlignInContainer.Center
                              LayoutMinHeight: =16
                              LayoutMinWidth: =16
                              Size: =20
                              Text: ="Case Orders"
                              Weight: ='TextCanvas.Weight'.Bold
                              Width: =Parent.Width -20
                  - txt_hdr_viewlabel_ifgs_1:
                      Control: Text@0.0.51
                      Properties:
                        Align: ='TextCanvas.Align'.End
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        Text: |-
                          ="View:  "
                        VerticalAlign: =VerticalAlign.Middle
                  - dd_viewselector_ifgs_1:
                      Control: DropDown@0.0.45
                      Properties:
                        DefaultSelectedItems: =["All Items"]
                        Items: =["All Items", "My Active Items", "Active Items"]
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        OnChange: =UpdateContext({screentitle:Self.Selected.Value})
                        Width: =200
                  - cnt_hdr_spacer2_ifgs_1:
                      Control: GroupContainer@1.4.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        FillPortions: =0
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        PaddingBottom: =8
                        PaddingLeft: =8
                        PaddingRight: =8
                        PaddingTop: =8
                        Width: =50
                  - btn_new_ifgs_1:
                      Control: Button@0.0.45
                      Properties:
                        AccessibleLabel: ="New"
                        DisplayMode: =DisplayMode.Disabled
                        Icon: ="Add"
                        Layout: ='ButtonCanvas.Layout'.IconBefore
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        OnSelect: |-
                          =Set(CurrentIntakeItem,Blank());
                          NewForm(FormCustomerDetail);
                          Navigate(IntakeFormScreen)
                        Text: ="New"
            - cnt_main_ifgs_1:
                Control: GroupContainer@1.4.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutMinHeight: =16
                  LayoutMinWidth: =16
                  PaddingBottom: =8
                  PaddingLeft: =8
                  PaddingRight: =8
                  PaddingTop: =8
                Children:
                  - cnt_gal_header_ifgs_1:
                      Control: GroupContainer@1.4.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        FillPortions: =0
                        Height: =25
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        PaddingBottom: =8
                        PaddingTop: =8
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                      Children:
                        - btn_patientuid_gal_header_ifgs_1:
                            Control: Button@0.0.45
                            Properties:
                              BorderColor: =RGBA(255, 255, 255, 1)
                              BorderStyle: =BorderStyle.Solid
                              BorderThickness: =1
                              Icon: =If(sortColumn = "PatientUID","ArrowDown", "Filter")
                              IconRotation: =If(sortColumn <> "PatientUID",0, If(sortOrder = SortOrder.Descending,0,180))
                              Layout: ='ButtonCanvas.Layout'.IconBefore
                              LayoutMinHeight: =16
                              LayoutMinWidth: =16
                              OnSelect: =UpdateContext({sortOrder:If(sortColumn<> "PatientUID",SortOrder.Descending,If(sortOrder = SortOrder.Ascending,SortOrder.Descending,SortOrder.Ascending)),sortColumn:"PatientUID"});
                              Text: ="Patient UID"
                              Width: =Parent.Width /4
                        - btn_date_gal_header_ifgs_1:
                            Control: Button@0.0.45
                            Properties:
                              BorderColor: =RGBA(255, 255, 255, 1)
                              BorderStyle: =BorderStyle.Solid
                              BorderThickness: =1
                              Icon: =If(sortColumn = "Date","ArrowDown","Filter")
                              IconRotation: =If(sortColumn <> "Date",0, If(sortOrder = SortOrder.Descending,0,180))
                              Layout: ='ButtonCanvas.Layout'.IconBefore
                              LayoutMinHeight: =16
                              LayoutMinWidth: =16
                              OnSelect: =UpdateContext({sortOrder:If(sortColumn<> "Date",SortOrder.Descending,If(sortOrder = SortOrder.Ascending,SortOrder.Descending,SortOrder.Ascending)),sortColumn:"Date"});
                              Text: ="Date"
                              Width: =Parent.Width/8
                        - btn_date_gal_header_ifgs_2:
                            Control: Button@0.0.45
                            Properties:
                              BorderColor: =RGBA(255, 255, 255, 1)
                              BorderStyle: =BorderStyle.Solid
                              BorderThickness: =1
                              FillPortions: =1
                              Icon: =If(sortColumn = "ProductCode","ArrowDown","Filter")
                              IconRotation: =If(sortColumn <> "Date",0, If(sortOrder = SortOrder.Descending,0,180))
                              Layout: ='ButtonCanvas.Layout'.IconBefore
                              LayoutMinHeight: =16
                              LayoutMinWidth: =16
                              OnSelect: =UpdateContext({sortOrder:If(sortColumn<> "Date",SortOrder.Descending,If(sortOrder = SortOrder.Ascending,SortOrder.Descending,SortOrder.Ascending)),sortColumn:"Date"});
                              Text: ="Product Code"
                              Width: =Parent.Width/8
                        - txt_spacer_cogs:
                            Control: Text@0.0.51
                            Properties:
                              LayoutMinHeight: =16
                              LayoutMinWidth: =16
                              Text: =
                  - gal_intake_ifgs_1:
                      Control: Gallery@2.15.0
                      Variant: BrowseLayout_Vertical_TwoTextOneImageVariant_ver5.0
                      Properties:
                        Items: |-
                          =Switch(
                              sortColumn,
                              "PatientUID",
                              If(
                                  sortOrder = SortOrder.Ascending,
                                  Sort(
                                      'UK Customs SharePoint Order Confirmation List',
                                      'Patient UID',
                                      SortOrder.Ascending
                                  ),
                                  Sort(
                                      'UK Customs SharePoint Order Confirmation List',
                                      'Patient UID',
                                      SortOrder.Descending
                                  )
                              ),
                              "Date",
                              If (
                                  sortOrder = SortOrder.Ascending,
                                  Sort(
                                      'UK Customs SharePoint Order Confirmation List',
                                      'Created',
                                      SortOrder.Ascending
                                  ),
                                  Sort(
                                      'UK Customs SharePoint Order Confirmation List',
                                      'Created',
                                      SortOrder.Descending
                                  )
                              ),
                              "ProductCode",
                              If (
                                  sortOrder = SortOrder.Ascending,
                                  Sort(
                                      'UK Customs SharePoint Order Confirmation List',
                                      Title,
                                      SortOrder.Ascending
                                  ),
                                  Sort(
                                      'UK Customs SharePoint Order Confirmation List',
                                      Title,
                                      SortOrder.Descending
                                  )
                              ),
                              Sort(
                                      'UK Customs SharePoint Order Confirmation List',
                                      'Created',
                                      SortOrder.Descending
                                  )
                          )
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        OnSelect: =Set(CurrentOrderItem,ThisItem);
                        TemplateFill: =If(ThisItem.IsSelected,Color.LightGray,RGBA(0,0,0,0))
                        TemplateSize: =40
                      Children:
                        - cnt_gal_ifgs_1:
                            Control: GroupContainer@1.4.0
                            Variant: AutoLayout
                            Properties:
                              DropShadow: =DropShadow.None
                              Height: =Parent.TemplateHeight
                              LayoutAlignItems: =LayoutAlignItems.Center
                              LayoutDirection: =LayoutDirection.Horizontal
                              PaddingBottom: =8
                              PaddingLeft: =8
                              PaddingRight: =8
                              PaddingTop: =8
                              Width: =Parent.Width
                            Children:
                              - txt_patientuid_gal_ifgs_1:
                                  Control: Text@0.0.51
                                  Properties:
                                    LayoutMaxHeight: =
                                    LayoutMaxWidth: =
                                    Text: =ThisItem.'Patient UID'
                                    Width: =Parent.Width /4
                                    X: =40
                                    Y: =8
                              - txt_created_gal_ifgs_1:
                                  Control: Text@0.0.51
                                  Properties:
                                    LayoutMaxHeight: =
                                    LayoutMaxWidth: =
                                    Text: =ThisItem.Created
                                    Width: =Parent.Width /8
                                    X: =
                              - txt_salesperson_gal_ifgs_1:
                                  Control: Text@0.0.51
                                  Properties:
                                    FillPortions: =1
                                    LayoutMaxHeight: =
                                    LayoutMaxWidth: =
                                    Text: =ThisItem.Title
                                    Width: =Parent.Width /4
                                    X: =
                                    Y: =8
                              - cnt_buttonspacer_gal_ifgs_1:
                                  Control: GroupContainer@1.4.0
                                  Variant: AutoLayout
                                  Properties:
                                    DropShadow: =DropShadow.None
                                    FillPortions: =0
                                    LayoutAlignItems: =LayoutAlignItems.Center
                                    LayoutDirection: =LayoutDirection.Horizontal
                                    LayoutMinHeight: =16
                                    LayoutMinWidth: =16
                                    PaddingBottom: =8
                                    PaddingLeft: =8
                                    PaddingRight: =8
                                    PaddingTop: =8
                                    Width: =20
                              - btn_view_gal_ifgs_1:
                                  Control: Button@0.0.45
                                  Properties:
                                    AccessibleLabel: ="New"
                                    Appearance: ='ButtonCanvas.Appearance'.Subtle
                                    Icon: ="Eye"
                                    Layout: ='ButtonCanvas.Layout'.IconOnly
                                    LayoutMaxHeight: =
                                    LayoutMaxWidth: =
                                    OnSelect: |
                                      =/*
                                      Set(CurrentOrderItem,ThisItem);
                                      ViewForm(FormOrderConfirmation);
                                      */
                                    Text: ="View"
                                    Width: =40
                                    X: =
                                    Y: =8
                              - cnt_buttonspacer_gal_ctgs_4:
                                  Control: GroupContainer@1.4.0
                                  Variant: AutoLayout
                                  Properties:
                                    DropShadow: =DropShadow.None
                                    FillPortions: =0
                                    LayoutAlignItems: =LayoutAlignItems.Center
                                    LayoutDirection: =LayoutDirection.Horizontal
                                    LayoutMinHeight: =16
                                    LayoutMinWidth: =16
                                    PaddingBottom: =8
                                    PaddingLeft: =8
                                    PaddingRight: =8
                                    PaddingTop: =8
                                    Width: =5
                              - btn_edit_gal_ctgs_2:
                                  Control: Button@0.0.45
                                  Properties:
                                    Appearance: ='ButtonCanvas.Appearance'.Subtle
                                    Icon: ="Edit"
                                    Layout: ='ButtonCanvas.Layout'.IconOnly
                                    LayoutMaxHeight: =
                                    LayoutMaxWidth: =
                                    OnSelect: |
                                      =
                                      Set(CurrentOrderItem,ThisItem);
                                      EditForm(FormOrderConfirmation);
                                      Navigate(CustomOrderScren);
                                    Text: ="Edit"
                                    Width: =40
                                    X: =
                                    Y: =8
