                        Width: =5
                  - btn_save_ifs:
                      Control: Button@0.0.45
                      Properties:
                        DisplayMode: =If(FormCustomerDetail.Mode = FormMode.View,DisplayMode.Disabled,DisplayMode.Edit)
                        Icon: ="Save"
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        OnSelect: |+
                          =UpdateContext({isupdating:true});
                          Notify("Saving...",NotificationType.Information,2000);
                          If(formCustomerDetailChanged,UpdateContext({form1:1}));
                          If(formPatientDetailsChanged,UpdateContext({form2:5}));
                          If(formImplantDetailsChanged,UpdateContext({form3:7}));
                          If(formPSIDetailChanged,UpdateContext({form4:9}));
                          UpdateContext({submitforms:form1+form2+form3+form4});
                          SubmitForm(FormIntakeUpdating);

                        Text: ="Save"
