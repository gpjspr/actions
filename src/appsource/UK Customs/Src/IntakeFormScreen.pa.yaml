                  - cnt_update_ifs:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        Height: =100
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Vertical
                        PaddingBottom: =8
                        PaddingLeft: =8
                        PaddingRight: =8
                        PaddingTop: =8
                        Visible: =false
                      Children:
                        - FormIntakeUpdating:
                            Control: Form@2.4.4
                            Layout: Vertical
                            Properties:
                              DataSource: ='UK Customs SharePoint Intake Form'
                              Height: =100
                              Item: =If(IsBlank(CurrentIntakeItem),Defaults('UK Customs SharePoint Intake Form'),CurrentIntakeItem)
                              OnSuccess: "=If(\n    Not(isupdating),\n    Notify(\n        \"Updating linked tracker form...\",\n        NotificationType.Information,\n        2000\n    );\n    //we have completed updating. Update tracker then - notify save\n    //patch tracker to notify we are updating\n    Patch(\n        'UK Customs SharePoint Custom Tracker List',\n        LookUp(\n            'UK Customs SharePoint Custom Tracker List',\n            UID_Power_Automate = CurrentIntakeItem.UID_Power_Automate\n        ),\n        {IsUpdating: true}\n    );\n    If(\n        Not(IsBlank(ctxSurgeon)),\n        Patch(\n            'UK Customs SharePoint Custom Tracker List',\n            LookUp(\n                'UK Customs SharePoint Custom Tracker List',\n                UID_Power_Automate = CurrentIntakeItem.UID_Power_Automate\n            ),\n            {Surgeon: ctxSurgeon.Id}\n        );\n    );\n    If(\n        Not(IsBlank(ctxRequest)),\n        Patch(\n            'UK Customs SharePoint Custom Tracker List',\n            LookUp(\n                'UK Customs SharePoint Custom Tracker List',\n                UID_Power_Automate = CurrentIntakeItem.UID_Power_Automate\n            ),\n            {'Request Type': ctxRequest}\n        );\n    );\n    If(\n        Not(IsBlank(ctxSalesPerson)),\n        Patch(\n            'UK Customs SharePoint Custom Tracker List',\n            LookUp(\n                'UK Customs SharePoint Custom Tracker List',\n                UID_Power_Automate = CurrentIntakeItem.UID_Power_Automate\n            ),\n            {\n                SalesPersonEmail: ctxSalesPerson.Email,\n                'Sales Person': ctxSalesPerson\n            }\n        );\n    );\n    If(\n        Not(IsBlank(ctxHospitalNumber)),\n        Patch(\n            'UK Customs SharePoint Custom Tracker List',\n            LookUp(\n                'UK Customs SharePoint Custom Tracker List',\n                UID_Power_Automate = CurrentIntakeItem.UID_Power_Automate\n            ),\n            {'Hospital Number: (MRN)': ctxHospitalNumber}\n        );\n    );\n    If(\n        Not(IsBlank(ctxHospital)),\n        Patch(\n            'UK Customs SharePoint Custom Tracker List',\n            LookUp(\n                'UK Customs SharePoint Custom Tracker List',\n                UID_Power_Automate = CurrentIntakeItem.UID_Power_Automate\n            ),\n            {Hospital: ctxHospital}\n        );\n    );\n    If(\n        Not(IsBlank(ctxAnatomicalRegions)),\n        Patch(\n            'UK Customs SharePoint Custom Tracker List',\n            LookUp(\n                'UK Customs SharePoint Custom Tracker List',\n                UID_Power_Automate = CurrentIntakeItem.UID_Power_Automate\n            ),\n            {'Anatomical Region': ctxAnatomicalRegions}\n        );\n    );\n    Patch(\n        'UK Customs SharePoint Custom Tracker List',\n        LookUp(\n            'UK Customs SharePoint Custom Tracker List',\n            UID_Power_Automate = CurrentIntakeItem.UID_Power_Automate\n        ),\n        {IsUpdating: false}\n    );\n    //priority list items\n    If(Not(IsBlank(ctxSchedule)),\n        Patch(\n            'Uk Customs SharePoint Custom Priority List',\n            LookUp(\n                'Uk Customs SharePoint Custom Priority List',\n                UID_Power_Automate = CurrentIntakeItem.UID_Power_Automate\n            ),\n            {'Surgery Date':ctxSchedule}\n        );\n    );\n    If(Not(IsBlank(ctxImplantReason)),\n        Patch(\n            'Uk Customs SharePoint Custom Priority List',\n            LookUp(\n                'Uk Customs SharePoint Custom Priority List',\n                UID_Power_Automate = CurrentIntakeItem.UID_Power_Automate\n            ),\n            {'Reason for Implant':ctxImplantReason}\n        );\n    );\n    If(Not(IsBlank(ctxUrgency)),\n        Patch(\n            'Uk Customs SharePoint Custom Priority List',\n            LookUp(\n                'Uk Customs SharePoint Custom Priority List',\n                UID_Power_Automate = CurrentIntakeItem.UID_Power_Automate\n            ),\n            {'Case Urgency':ctxUrgency}\n        );\n    );\n    If(Not(IsBlank(ctxSurgeon)),\n        Patch(\n            'Uk Customs SharePoint Custom Priority List',\n            LookUp(\n                'Uk Customs SharePoint Custom Priority List',\n                UID_Power_Automate = CurrentIntakeItem.UID_Power_Automate\n            ),\n            {'Surgeon Weight':LookUp('UK Customs SharePoint Surgeon Kardex List',ID=ctxSurgeon.Id).'Priority Category'}\n        );\n    );\n    Notify(\n        \"Saved\",\n        NotificationType.Success,\n        4000\n    ),\n    If(\n        Or(\n            submitforms = 1,\n            submitforms = 6,\n            submitforms = 13,\n            submitforms = 22,\n            submitforms = 8,\n            submitforms = 17,\n            submitforms = 10\n        ),\n        SubmitForm(FormCustomerDetail),\n        If(\n            Or(\n                submitforms = 5,\n                submitforms = 12,\n                submitforms = 21,\n                submitforms = 14\n            ),\n            SubmitForm(FormPatientDetails),\n            If(\n                Or(\n                    submitforms = 7,\n                    submitforms = 16\n                ),\n                SubmitForm(FormImplantDetails),\n                If(\n                    submitforms = 9,\n                    SubmitForm(FormPSIs);\n                )\n            )\n        )\n    );\n    \n);\n"
                            Children:
                              - dc_isupdating_ifs:
                                  Control: TypedDataCard@1.0.7
                                  Variant: ToggleEdit
                                  Properties:
                                    DataField: ="IsUpdating"
                                    Default: =isupdating
                                    DisplayName: =DataSourceInfo([@'UK Customs SharePoint Intake Form'],DataSourceInfo.DisplayName,IsUpdating)
                                    Height: =40
                                    Required: =false
                                    Update: =tgl_dc_isupdating_ifs.Checked
                                    Width: =434
                                    X: =0
                                    Y: =0
                                  Children:
                                    - txt_dc_isupdating_label_ifs:
                                        Control: Text@0.0.51
                                        MetadataKey: FieldName
                                        Properties:
                                          Height: =22
                                          Text: =Parent.DisplayName
                                          Weight: ='TextCanvas.Weight'.Semibold
                                          Width: =Parent.Width - 48
                                          Wrap: =false
                                          X: =24
                                          Y: =10
                                    - tgl_dc_isupdating_ifs:
                                        Control: Toggle@1.1.5
                                        MetadataKey: FieldValue
                                        Properties:
                                          AccessibleLabel: =If(Parent.Required, Substitute("{0}. Required.", "{0}", Parent.DisplayName), Parent.DisplayName)
                                          Checked: =Parent.Default
                                          DisplayMode: =Parent.DisplayMode
                                          Height: =32
                                          Label: =""
                                          Width: =Parent.Width - 48
                                          X: =24
                                          Y: =txt_dc_isupdating_label_ifs.Y + txt_dc_isupdating_label_ifs.Height + 4
            - cnt_ftr_ifs:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  FillPortions: =0
                  Height: =40
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutMinHeight: =16
                  LayoutMinWidth: =16
                  PaddingBottom: =8
                  PaddingLeft: =8
                  PaddingRight: =8
                  PaddingTop: =8
                Children:
                  - cnt_ftr_mainspacer_ifs:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        PaddingBottom: =8
                        PaddingLeft: =8
                        PaddingRight: =8
                        PaddingTop: =8
                  - btn_cancel_ifs:
                      Control: Button@0.0.45
                      Properties:
                        AccessibleLabel: ="Cancel"
                        Appearance: ='ButtonCanvas.Appearance'.Secondary
                        Icon: ="Dismiss"
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
