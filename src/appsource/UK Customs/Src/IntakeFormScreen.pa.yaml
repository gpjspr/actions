Screens:
  IntakeFormScreen:
    Properties:
      OnVisible: |
        =UpdateContext({selectedTab: {Value: "Customer Detail"}});
        If(
            Not(IsBlank(CurrentIntakeItem)),
            UpdateContext({currentitempatientid: "for " & CurrentIntakeItem.'Patient UID:'}),
            UpdateContext({currentitempatientid: " (New Item)"})
        );
        If(
            Not(IsBlankOrError(Param("entity"))),
            Set(
                CurrentIntakeItem,
                LookUp(
                    'UK Customs SharePoint Intake Form',
                    ID = Int(Param("id"))
                )
            );
            UpdateContext({currentitempatientid: "for " & CurrentIntakeItem.'Patient UID:'}),
            Notify(
                "Loading intake item..." & CurrentIntakeItem.'Patient UID:',
                NotificationType.Information,
                2000
            )
        );
        If(
            DataCardValue106.Selected.Value = "Pelvis",
            Set(
                VarVisiblePelvis,
                true
            ),
            Set(
                VarVisiblePelvis,
                false
            )
        );
        If(
            DataCardValue106.Selected.Value = "Femur",
            Set(
                VarVisibleFemur,
                true
            ),
            Set(
                VarVisibleFemur,
                false
            )
        );
        If(
            DataCardValue106.Selected.Value = "Humerus",
            Set(
                VarVisibleHumerus,
                true
            ),
            Set(
                VarVisibleHumerus,
                false
            )
        );
        If(
            DataCardValue106.Selected.Value = "Knee",
            Set(
                VarVisibleKnee,
                true
            ),
            Set(
                VarVisibleKnee,
                false
            )
        );
        If(
            DataCardValue106.Selected.Value = "Elbow",
            Set(
                VarVisibleElbow,
                true
            ),
            Set(
                VarVisibleElbow,
                false
            )
        );
        If(
            DataCardValue106.Selected.Value = "Tibia",
            Set(
                VarVisibleTibia,
                true
            ),
            Set(
                VarVisibleTibia,
                false
            )
        );
        If(
            DataCardValue106.Selected.Value = "Ulna",
            Set(
                VarVisibleUlna,
                true
            ),
            Set(
                VarVisibleUlna,
                false
            )
        );
        If(
            DataCardValue106.Selected.Value = "Radius",
            Set(
                VarVisibleRadius,
                true
            ),
            Set(
                VarVisibleRadius,
                false
            )
        );
