                            Children:
                              - FormPSIs:
                                  Control: Form@2.4.4
                                  Layout: Vertical
                                  Properties:
                                    BorderColor: =RGBA(166, 166, 166, 1)
                                    DataSource: ='UK Customs SharePoint Intake Form'
                                    Item: =If(IsBlank(CurrentIntakeItem),Defaults('UK Customs SharePoint Intake Form'),CurrentIntakeItem)
                                    LayoutMaxHeight: =
                                    LayoutMaxWidth: =
                                    NumberOfColumns: =2
                                    OnSuccess: "=//action orders\nUpdateContext({ctxOrderItem: Blank()});\n//pre bone model. if has changed, will be check or uncheck. If not changed, no action required\nIf(\n    ctxPreprepBoneModel = \"check\",\n    Patch(\n        'UK Customs SharePoint Order Confirmation List',\n        Defaults('UK Customs SharePoint Order Confirmation List'),\n        {\n            Title: CurrentIntakeItem.'Patient UID:' & \" - PSI - Pre-Preparation Bone Model\",\n            Description: \"PSI - Pre-Preparation Bone Model\",\n            'Patient UID': CurrentIntakeItem.'Patient UID:',\n            Qty:1,\n            'Sale Price':750,\n            Quote:true,\n            PSI:true,\n            'Bone Model':false,\n            Hospital:CurrentIntakeItem.'Hospital:',\n            'Sales Person':CurrentIntakeItem.'Sales Person',\n            'Custom or loan kit item':{Value:\"Custom\"}\n        }\n    );\n    ctxPreprepBoneModel = \"uncheck\",\n    UpdateContext(\n        {\n            ctxOrderItem: First(\n                Filter(\n                    'UK Customs SharePoint Order Confirmation List',\n                    Description = \"PSI - Pre-Preparation Bone Model\" && Status.Value = \"Open\" && 'Patient UID' = CurrentIntakeItem.'Patient UID:'\n                )\n            )\n        }\n    );\n    If(\n        Not(IsBlank(ctxOrderItem)),\n        Remove(\n            'UK Customs SharePoint Order Confirmation List',\n            First(\n                Filter(\n                    'UK Customs SharePoint Order Confirmation List',\n                    Description = \"PSI - Pre-Preparation Bone Model\" && Status.Value = \"Open\" && 'Patient UID' = CurrentIntakeItem.'Patient UID:'\n                )\n            )\n        );\n    );\n    \n);\n\n//post bone model. if has changed, will be check or uncheck. If not changed, no action required\nUpdateContext({ctxOrderItem: Blank()});\nIf(\n    ctxPostprepBoneModel = \"check\",\n    Patch(\n        'UK Customs SharePoint Order Confirmation List',\n        Defaults('UK Customs SharePoint Order Confirmation List'),\n        {\n            Title: CurrentIntakeItem.'Patient UID:' & \" - PSI - Post-Preparation Bone Model\",\n            Description: \"PSI - Post-Preparation Bone Model\",\n            'Patient UID': CurrentIntakeItem.'Patient UID:',\n            Qty:1,\n            'Sale Price':750,\n            Quote:true,\n            PSI:true,\n            'Bone Model':false,\n            Hospital:CurrentIntakeItem.'Hospital:',\n            'Sales Person':CurrentIntakeItem.'Sales Person',\n            'Custom or loan kit item':{Value:\"Custom\"}\n        }\n    );\n    ctxPostprepBoneModel = \"uncheck\",\n    UpdateContext(\n        {\n            ctxOrderItem: First(\n                Filter(\n                    'UK Customs SharePoint Order Confirmation List',\n                    Description = \"PSI - Post-Preparation Bone Model\" && Status.Value = \"Open\" && 'Patient UID' = CurrentIntakeItem.'Patient UID:'\n                )\n            )\n        }\n    );\n    If(\n        Not(IsBlank(ctxOrderItem)),\n        Remove(\n            'UK Customs SharePoint Order Confirmation List',\n            First(\n                Filter(\n                    'UK Customs SharePoint Order Confirmation List',\n                    Description = \"PSI - Post-Preparation Bone Model\" && Status.Value = \"Open\" && 'Patient UID' = CurrentIntakeItem.'Patient UID:'\n                )\n            )\n        );\n    );\n    \n);\n\n//trial implant\nUpdateContext({ctxOrderItem: Blank()});\nIf(\n    ctxTrialImplant = \"check\",\n    Patch(\n        'UK Customs SharePoint Order Confirmation List',\n        Defaults('UK Customs SharePoint Order Confirmation List'),\n        {\n            Title: CurrentIntakeItem.'Patient UID:' & \" - PSI - Trial Implant\",\n            Description: \"PSI - Trial Implant\",\n            'Patient UID': CurrentIntakeItem.'Patient UID:',\n            Qty:1,\n            'Sale Price':385,\n            Quote:true,\n            PSI:true,\n            'Bone Model':false,\n            Hospital:CurrentIntakeItem.'Hospital:',\n            'Sales Person':CurrentIntakeItem.'Sales Person',\n            'Custom or loan kit item':{Value:\"Custom\"}\n        }\n    );\n    ctxTrialImplant = \"uncheck\",\n    UpdateContext(\n        {\n            ctxOrderItem: First(\n                Filter(\n                    'UK Customs SharePoint Order Confirmation List',\n                    Description = \"PSI - Trial Implant\" && Status.Value = \"Open\" && 'Patient UID' = CurrentIntakeItem.'Patient UID:'\n                )\n            )\n        }\n    );\n    If(\n        Not(IsBlank(ctxOrderItem)),\n        Remove(\n            'UK Customs SharePoint Order Confirmation List',\n            First(\n                Filter(\n                    'UK Customs SharePoint Order Confirmation List',\n                    Description = \"PSI - Trial Implant\" && Status.Value = \"Open\" && 'Patient UID' = CurrentIntakeItem.'Patient UID:'\n                )\n            )\n        );\n    );\n    \n);\n\n//Partial Trial Implant\nUpdateContext({ctxOrderItem: Blank()});\nIf(\n    ctxPartialTrialImplant = \"check\",\n    Patch(\n        'UK Customs SharePoint Order Confirmation List',\n        Defaults('UK Customs SharePoint Order Confirmation List'),\n        {\n            Title: CurrentIntakeItem.'Patient UID:' & \" - PSI - Partial Trial Implant\",\n            Description: \"PSI - Partial Trial Implant\",\n            'Patient UID': CurrentIntakeItem.'Patient UID:',\n            Qty:1,\n            'Sale Price':385,\n            Quote:true,\n            PSI:true,\n            'Bone Model':false,\n            Hospital:CurrentIntakeItem.'Hospital:',\n            'Sales Person':CurrentIntakeItem.'Sales Person',\n            'Custom or loan kit item':{Value:\"Custom\"}\n        }\n    );\n    ctxPartialTrialImplant = \"uncheck\",\n    \n    UpdateContext(\n        {\n            ctxOrderItem: First(\n                Filter(\n                    'UK Customs SharePoint Order Confirmation List',\n                    Description = \"PSI - Partial Trial Implant\" && Status.Value = \"Open\" && 'Patient UID' = CurrentIntakeItem.'Patient UID:'\n                )\n            )\n        }\n    );\n    If(\n        Not(IsBlank(ctxOrderItem)),\n        Remove(\n            'UK Customs SharePoint Order Confirmation List',\n            First(\n                Filter(\n                    'UK Customs SharePoint Order Confirmation List',\n                    Description = \"PSI - Partial Trial Implant\" && Status.Value = \"Open\" && 'Patient UID' = CurrentIntakeItem.'Patient UID:'\n                )\n            )\n        );\n    );\n    \n);\n\n//Perforated Trial Implant\nUpdateContext({ctxOrderItem: Blank()});\nIf(\n    ctxPerforatedTrialImplant = \"check\",\n    Patch(\n        'UK Customs SharePoint Order Confirmation List',\n        Defaults('UK Customs SharePoint Order Confirmation List'),\n        {\n            Title: CurrentIntakeItem.'Patient UID:' & \" - PSI - Perforated Trial Implant\",\n            Description: \"PSI - Perforated Trial Implant\",\n            'Patient UID': CurrentIntakeItem.'Patient UID:',\n            Qty:1,\n            'Sale Price':385,\n            Quote:true,\n            PSI:true,\n            'Bone Model':false,\n            Hospital:CurrentIntakeItem.'Hospital:',\n            'Sales Person':CurrentIntakeItem.'Sales Person',\n            'Custom or loan kit item':{Value:\"Custom\"}\n        }\n    );\n    ctxPerforatedTrialImplant = \"uncheck\",\n    UpdateContext(\n        {\n            ctxOrderItem: First(\n                Filter(\n                    'UK Customs SharePoint Order Confirmation List',\n                    Description = \"PSI - Perforated Trial Implant\" && Status.Value = \"Open\" && 'Patient UID' = CurrentIntakeItem.'Patient UID:'\n                )\n            )\n        }\n    );\n    If(\n        Not(IsBlank(ctxOrderItem)),\n        Remove(\n            'UK Customs SharePoint Order Confirmation List',\n            First(\n                Filter(\n                    'UK Customs SharePoint Order Confirmation List',\n                    Description = \"PSI - Perforated Trial Implant\" && Status.Value = \"Open\" && 'Patient UID' = CurrentIntakeItem.'Patient UID:'\n                )\n            )\n        );\n    );\n    \n);\n//Resection Guide\nUpdateContext({ctxOrderItem: Blank()});\nIf(\n    ctxResectionGuide = \"check\",\n    Patch(\n        'UK Customs SharePoint Order Confirmation List',\n        Defaults('UK Customs SharePoint Order Confirmation List'),\n        {\n            Title: CurrentIntakeItem.'Patient UID:' & \" - PSI - Resection Guide\",\n            Description: \"PSI - Resection Guide\",\n            'Patient UID': CurrentIntakeItem.'Patient UID:',\n            Qty:1,\n            'Sale Price':385,\n            Quote:true,\n            PSI:true,\n            'Bone Model':false,\n            Hospital:CurrentIntakeItem.'Hospital:',\n            'Sales Person':CurrentIntakeItem.'Sales Person',\n            'Custom or loan kit item':{Value:\"Custom\"}\n        }\n    );\n    ctxResectionGuide = \"uncheck\",\n    UpdateContext(\n        {\n            ctxOrderItem: First(\n                Filter(\n                    'UK Customs SharePoint Order Confirmation List',\n                    Description = \"PSI - Resection Guide\" && Status.Value = \"Open\" && 'Patient UID' = CurrentIntakeItem.'Patient UID:'\n                )\n            )\n        }\n    );\n    If(\n        Not(IsBlank(ctxOrderItem)),\n        Remove(\n            'UK Customs SharePoint Order Confirmation List',\n            First(\n                Filter(\n                    'UK Customs SharePoint Order Confirmation List',\n                    Description = \"PSI - Resection Guide\" && Status.Value = \"Open\" && 'Patient UID' = CurrentIntakeItem.'P