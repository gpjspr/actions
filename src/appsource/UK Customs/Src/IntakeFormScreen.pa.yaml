                          =ResetForm(FormCustomerDetail);
                          ResetForm(FormPatientDetails);
                          ResetForm(FormImplantDetails);
                          ResetForm(FormPSIs);
                          Set(CurrentIntakeItem,Blank());
                          Back()
                        Text: ="Cancel"
                  - cnt_ftr_buttonspacer_ifs:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        FillPortions: =0
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutMinHeight: =16
