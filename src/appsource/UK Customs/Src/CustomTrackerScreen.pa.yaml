                  - btn_save_cts:
                      Control: Button@0.0.45
                      Properties:
                        AccessibleLabel: ="Save"
                        DisplayMode: |-
                          =If(
                              FormCustomTracker.Mode = FormMode.View || recordSubmitting || And(
                                  Not(IsBlank(CurrentTrackerItem)),
                                  Not(CurrentTrackerItem.'Case Status'.Value = "Active")
                              ),
                              DisplayMode.View,
                              DisplayMode.Edit
                          )
                        Icon: ="Save"
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        OnSelect: "=UpdateContext({recordSubmitting: true});\nSubmitForm(FormCustomTracker);\nIf (\n    IsBlank(CurrentTrackerItem),\n    Set(\n        NewTrackerItem,\n        FormCustomTracker.LastSubmit\n    );\n    UpdateContext(\n        {\n            ctxCurrentitempatientid: Text(\n                NewTrackerItem.ID,\n                \"UID - 000000\"\n            )\n        }\n    );\n    Notify(\n        \"Creating new tracker \" & ctxCurrentitempatientid & \" - Please wait...\",\n        NotificationType.Information\n    );\n    //update tracker to set UID_POwer_Automate & isUpdating to true to stop any triggers\n    Patch(\n        'UK Customs SharePoint Custom Tracker List',\n        LookUp(\n            'UK Customs SharePoint Custom Tracker List',\n            ID = NewTrackerItem.ID\n        ),\n        {\n            UID_Power_Automate: ctxCurrentitempatientid,\n            IsUpdating: true\n        }\n    );\n    Set(\n        CurrentTrackerItem,\n        LookUp(\n            'UK Customs SharePoint Custom Tracker List',\n            ID = NewTrackerItem.ID\n        )\n    );\n    //patch other lists for new case concurrently\n    Concurrent(\n        Patch(\n            'UK Customs SharePoint Intake Form',\n            Defaults('UK Customs SharePoint Intake Form'),\n            {\n                'Hospital Number: (MRN)': CurrentTrackerItem.'Hospital Number: (MRN)',\n                'Sales Representative:': CurrentTrackerItem.'Sales Representative',\n                UID_Power_Automate: CurrentTrackerItem.UID_Power_Automate,\n                'Case Tracker ID': {\n                    Id: CurrentTrackerItem.ID,\n                    Value: CurrentTrackerItem.Title\n                }\n            }\n        ),\n        Patch(\n            'UK Customs SharePoint Case Log List',\n            Defaults('UK Customs SharePoint Case Log List'),\n            {\n                Title: CurrentTrackerItem.UID_Power_Automate,\n                'Sales P': CurrentTrackerItem.'Sales Person'.DisplayName\n            }\n        ),\n        Patch(\n            'UK Customs SharePoint Order Confirmation List',\n            Defaults('UK Customs SharePoint Order Confirmation List'),\n            {\n                'Sales Person': CurrentTrackerItem.'Sales Person',\n                'Patient UID Lookup': {\n                    Id: CurrentTrackerItem.ID,\n                    Value: CurrentTrackerItem.Title,\n                    Title: CurrentTrackerItem.UID_Power_Automate,\n                    'Patient UID': CurrentTrackerItem.UID_Power_Automate,\n                    'Patient UID Lookup': {\n                        ID: CurrentTrackerItem.ID,\n                        Value: CurrentTrackerItem.UID_Power_Automate\n                    }\n                }\n            }\n        ),\n        Patch(\n            'UK Customs SharePoint Design Proposal',\n            Defaults('UK Customs SharePoint Design Proposal'),\n            {\n                UID_Power_Automate: CurrentTrackerItem.UID_Power_Automate,\n                'Patient Folder': gblEnvironmentVariables.sharepointurl & gblEnvironmentVariables.casesfolder & CurrentTrackerItem.UID_Power_Automate\n            }\n        );\n        Patch(\n            'UK Customs SharePoint Case Intake Review Form',\n            Defaults('UK Customs SharePoint Case Intake Review Form'),\n            {\n                'Patient Folder': gblEnvironmentVariables.sharepointurl & gblEnvironmentVariables.casesfolder & CurrentTrackerItem.UID_Power_Automate,\n                'Has FlightDeck been Updated': true,\n                'Submit Patient Form': true,\n                'Is all the required information present on the patient form?': false,\n                'Does the patient Information align with the images provided?': false,\n                'Is the images sufficient for the requested implant?': false,\n                'Generate Out of Date Confirmation': false,\n                'Generate Slice Thickness Email': false,\n                UID_Power_Automate: CurrentTrackerItem.UID_Power_Automate,\n                'Case Intake Form ID': CurrentTrackerItem.ID,\n                'Generate Word Document': false,\n                'Reviewed Patient Image': false,\n                'Generate Initial Case Email': false,\n                'Images Review Completed': false\n            }\n        ),\n        Patch(\n            'UK Customs SharePoint Custom Dates List',\n            Defaults('UK Customs SharePoint Custom Dates List'),\n            {\n                'Sales Person': CurrentTrackerItem.'Sales Person',\n                'Case Tracker ID': CurrentTrackerItem.ID,\n                'Patient Folder': gblEnvironmentVariables.sharepointurl & gblEnvironmentVariables.casesfolder & CurrentTrackerItem.UID_Power_Automate,\n                UID_Power_Automate: CurrentTrackerItem.UID_Power_Automate\n            }\n        );\n    );\n    //run this after concurrent as we need to have the custom date log in place\n    Patch(\n        'Uk Customs SharePoint Custom Priority List',\n        Defaults('Uk Customs SharePoint Custom Priority List'),\n        {\n            'Case Status': CurrentTrackerItem.'Case Status'.Value,\n            'Sales Person': CurrentTrackerItem.'Sales Person'.DisplayName,\n            'Reason for Implant': \"Revision\",\n            'Case Tracker ID': CurrentTrackerItem.ID,\n            UID_Power_Automate: CurrentTrackerItem.UID_Power_Automate,\n            'Patient Folder': gblEnvironmentVariables.sharepointurl & gblEnvironmentVariables.casesfolder & CurrentTrackerItem.UID_Power_Automate,\n            'Case Urgency': \"Not Urgent\",\n            'Case Tracker ID Lookup': {\n                Id: CurrentTrackerItem.ID,\n                Value: CurrentTrackerItem.ID\n            },\n            'Case Date Log ID': {\n                Id: LookUp(\n                    'UK Customs SharePoint Custom Dates List',\n                    UID_Power_Automate = CurrentTrackerItem.UID_Power_Automate\n                ).ID,\n                Value: LookUp(\n                    'UK Customs SharePoint Custom Dates List',\n                    UID_Power_Automate = CurrentTrackerItem.UID_Power_Automate\n                ).ID\n            }\n        }\n    );\n    //final update of tracker item\n    Patch(\n        'UK Customs SharePoint Custom Tracker List',\n        LookUp(\n            'UK Customs SharePoint Custom Tracker List',\n            ID = CurrentTrackerItem.ID\n        ),\n        {\n            'Patient Folder': gblEnvironmentVariables.sharepointurl & gblEnvironmentVariables.casesfolder & CurrentTrackerItem.UID_Power_Automate,\n            'Last Updated': Now(),\n            CaseIntakeReviewID: LookUp(\n                'UK Customs SharePoint Case Intake Review Form',\n                UID_Power_Automate = CurrentTrackerItem.UID_Power_Automate\n            ).ID,\n            SalesPersonEmail: CurrentTrackerItem.'Sales Person'.Email,\n            'Case Intake Form ID': LookUp(\n                'UK Customs SharePoint Intake Form',\n                UID_Power_Automate = CurrentTrackerItem.UID_Power_Automate\n            ).ID,\n            'Case Feedback Form': \"https://forms.office.com/e/04QUAVxFaM\",\n            'Assign Design Engineer': false,\n            'Custom Dates Log ID': LookUp(\n                'UK Customs SharePoint Custom Dates List',\n                UID_Power_Automate = CurrentTrackerItem.UID_Power_Automate\n            ).ID,\n            'Request Type': \"Custom Planning\",\n            CaseStage: \" Case Intake \",\n            // assume that case stage must be case intake to begin?\n            StatusStepNumber: ctxStepNumber,\n            IsUpdating: false\n        }\n    );\n    //call patient folders flow. If an error, we don't proceed ?\n    UpdateContext(\n        {\n            folderscreated: UkCUstomsCreatePatientFolders.Run(\n                CurrentTrackerItem.UID_Power_Automate,\n                If(\n                    IsBlank(CurrentTrackerItem.'Sales Person'.Email),\n                    \"\",\n                    CurrentTrackerItem.'Sales Person'.Email\n                )\n            )\n        }\n    );\n    If(\n        Lower(folderscreated.result) = \"true\",\n        Notify(\n            \"Completed Creating new tracker \" & ctxCurrentitempatientid,\n            NotificationType.Success,\n            2000\n        );\n        ,\n        Notify(\n            \"Tracker created but error creating folders\",\n            NotificationType.Error,\n            3000\n        );\n    );\n    Set(\n        CurrentTrackerItem,\n        LookUp(\n            'UK Customs SharePoint Custom Tracker List',\n            ID = CurrentTrackerItem.ID\n        )\n    );\n    //run flow to send email on new case\n    UKCustomsNewCaseCreated.Run(CurrentTrackerItem.ID);\n    //end of new item\n    ,\n    Set(\n        CurrentTrackerItem,\n        FormCustomTracker.LastSubmit\n    );\n    //if delivery date has changed, call flow to notify sales rep\n    If(\n        deliverydatechanged,\n        UKCustomsUpdateDeliveryDate.Run(CurrentTrackerItem.ID)\n    );\n    //patch intake and tracker if sales rep changes\n    If(\n        Not(IsBlank(selectedSalesPersonEmail)),\n        Patch(\n            'UK Customs SharePoint Intake Form',\n            LookUp(\n                'UK Customs SharePoint Intake Form',\n                UID_Power_Automate = CurrentTrackerItem.UID_Power_Automate\n            ),\n            {'Sales Person': CurrentTrackerItem.'Sales Person'}\n        );\n        Patch(\n            'Uk Customs SharePoint Custom Priority List',\n            LookUp(\n                'Uk Customs SharePoint Custom Priority List',\n                UID_Power_Automate = CurrentTrackerItem.UID_Power_Automate\n            ),\n            {'Sales Person': CurrentTrackerItem.'Sales Person'.DisplayName}\n        );\n    );\n    If(\n        Not(IsBlank(caseStatus)),\n        Patch(\n            'Uk Customs SharePoint Custom Priority List',\n            LookUp(\n                'Uk Customs SharePoint Custom Priority List',\n                UID_Power_Automate = CurrentTrackerItem.UID_Power_Automate\n            ),\n            {'Case Status': caseStatus}\n        );\n    );\n    //if submitpatientformforreview\n    If(\n        submitpatientformforreview,\n        UKCustomsIntakeFormReview.Run(\n            submitpatientformforreview,\n            CurrentIntakeItem.ID\n        );\n    );\n    //updatepricing\n    If(\n        requestquotation,\n        UKCustomsUpdatePricingItem.Run(CurrentTrackerItem.ID)\n    );\n    \n    //patch the custom dates log. Only patch fields that are updated and true otherwise set to blank\n    Patch(\n        'UK Customs SharePoint Custom Dates List',\n        LookUp(\n            'UK Customs SharePoint Custom Dates List',\n            UID_Power_Automate = CurrentTrackerItem.UID_Power_Automate\n        ),\n        {\n            'Date Request Images form PACs Department': If(\n                requestimagesfrompacsdepartment,\n                Now()\n            ),\n            'Date Download and save images in patient folder': If(\n                isthepatientimagesavailable,\n                Now()\n            ),\n            'Date Complete the Case Intake Form': If(\n                completeinformationonintakeform,\n                Now()\n            ),\n            'Date Submit Patient Form For Review': If(\n                submitpatientformforreview,\n                Now()\n            ),\n            'Date Complete Case Intake Review': If(\n                completecaseintakereview,\n                Now()\n            ),\n            'Date Generate & Send Initial Case Email': If(\n                generateinitialcaseemail,\n                Now()\n            ),\n            'Date C-Fit Number': If(\n                cfitnumber,\n                Now()\n            ),\n            'Date Planning Can Continue': If(\n                planningcanstart,\n                Now()\n            ),\n            'Date Concept Received': If(\n                conceptreceived,\n                Now()\n            ),\n            'Date Approved Concept': If(\n                surgeonapproved,\n                Now()\n            ),\n            'Date Rejected Concept': If(\n                surgeonrejected,\n                Now()\n            ),\n            'Date Submit Design Proposal for Review': If(\n                submitdesignproposalforreview,\n                Now()\n            ),\n            'Date Review Design Proposal': If(\n                reviewdesignproposal,\n                Now()\n            ),\n            'Date Send Design Proposal to Surgeon': If(\n                designproposalsent,\n                Now()\n            ),\n            'Date Design Proposal Approved': If(\n                designproposalapproved,\n                Now()\n            ),\n            'Date Design Proposal Rejected': If(\n                designproposalrejected,\n                Now()\n            ),\n            'Date Sign Prescription Form': If(\n                prescriptionformsigned,\n                Now()\n            ),\n            'Date Request Quotation': If(\n                requestquotation,\n                Now()\n            ),\n            'Date PO Received and Communicated to Customer Service': If(\n                poreceivedcommunicated,\n                Now()\n            ),\n            'Date Send Quotation to Sales Person': If(\n                quotationavailable,\n                Now()\n            ),\n            'Date Trigger Manufacturing': If(\n                submitmanufactuingapproval,\n                Now()\n            ),\n            'Date Delivery Date': If(\n                advisedeliverydate,\n                Now()\n            ),\n            'Date Surgery Date': If(\n                advisesurgerydate,\n                Now()\n            ),\n            'Date Confirm OC': If(\n                adviseoc,\n                Now()\n            ),\n            'Date Approve OC': If(\n                approveoc,\n                Now()\n            ),\n            'Date Delivered': If(\n                shipping,\n                Now()\n            ),\n            'Date Record Usage': If(\n                recordusage,\n                Now()\n            )\n        }\n    );\n    //if delivered, notify salesperson\n    If(\n        shipping,\n        UKCustomsEmailDeliveryOfCustom.Run(CurrentTrackerItem.ID)\n    );\n    If(\n        And(\n            Or(\n                Not(IsBlank(CurrentTrackerItem.'Delivery to UK Date')),\n                advisedeliverydate\n            ),\n            Or(\n                CurrentTrackerItem.'Custom components delivered to the UK',\n                shipping\n            ),\n            Or(\n                CurrentTrackerItem.'Confirm OC',\n                adviseoc\n            ),\n            CurrentTrackerItem.'Update Custom Pricing Items',\n            CurrentTrackerItem.'Confirm PSI''s',\n            Or(\n                Not(IsBlank(CurrentTrackerItem.'Surgery Date')),\n                advisesurgerydate\n            )\n        ),\n        UKCustomsUpdateFlightdeck.Run(CurrentTrackerItem.ID)\n    );\n    If(\n        And(\n            assigndesignengineer,\n            Not(IsBlank(CurrentTrackerItem.'C-Fit Number'))\n        ),\n        UKCustomsCreateCADFolders.Run(CurrentTrackerItem.'C-Fit Number')\n    );\n    //final update of this tracker item on save\n    Patch(\n        LookUp(\n            'UK Customs SharePoint Custom Tracker List',\n            ID = CurrentTrackerItem.ID\n        ),\n        {\n            IsUpdating: false,\n            'Last Updated': Now(),\n            'Assign Design Engineer': assigndesignengineer// true or false\n        }\n    );\n    Notify(\"Saved\",NotificationType.Success,2000);\n    \n);\nUpdateContext({recordSubmitting: false});\n"
                        Text: ="Save"
      - dd_requesttype:
          Control: DropDown@0.0.45
          Properties:
            DefaultSelectedItems: =If(IsBlank(CurrentTrackerItem),First(colTrackerChoices),LookUp(colTrackerChoices,Value=CurrentTrackerItem.'Request Type'))
            Items: =colTrackerChoices
            OnChange: |-
              =If(dd_requesttype.Selected.Value="Custom Planning",UpdateContext({ requesttypeCustom: true }),UpdateContext({ requesttypeCustom: false }))
            Visible: =false
            X: =Parent.Width-Self.Width
