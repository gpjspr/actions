Screens:
  CustomTrackerScreen:
    Properties:
      OnVisible: "=//choices for top dd_requesttype\nCollect(\n    colTrackerChoices,\n    {Value: \"Standard Implant Planning\"},\n    {Value: \"Custom Planning\"}\n);\nIf(\n    Not(IsBlank(CurrentTrackerItem)),\n    UpdateContext({ctxSelectedTab: {Value: \"Process\"}});\n    UpdateContext({ctxCurrentitempatientid: CurrentTrackerItem.'Patient UID'});\n    UpdateContext({selectedSalesPersonEmail: CurrentTrackerItem.'Sales Person'.Email});\n    UpdateContext(\n        {\n            currentStage: CurrentTrackerItem.CaseStage,\n            ctxStepNumber: CurrentTrackerItem.StatusStepNumber\n        }\n    );\n    //GPJ changed this to text field;\n    ,\n        //new item\n    UpdateContext({ctxSelectedTab: {Value: \"Case Details\"}});\n    UpdateContext({ctxCurrentitempatientid: \"(New Item)\"});\n    UpdateContext(\n        {\n            currentStage: \" Case Intake \",\n            ctxStepNumber: 0\n        }\n    );\n    \n);\nIf(\n    Not(IsBlankOrError(Param(\"entity\"))),\n    Set(\n        CurrentTrackerItem,\n        LookUp(\n            'UK Customs SharePoint Custom Tracker List',\n            ID = Int(Param(\"id\"))\n        )\n    );\n    UpdateContext({ctxCurrentitempatientid: CurrentTrackerItem.'Patient UID'});\n    Notify(\n        \"Loading tracker item...\" & CurrentTrackerItem.'Patient UID',\n        NotificationType.Information,\n        2000\n    )\n);\nUpdateContext({isupdating: false});\n//Kevin\n//Setting the visibility based on if \"Request Type is Custom Or Standar Plan\"\n//Use the be formula once we go live\n//UpdateContext({requesttype:CurrentTrackerItem.'Request Type'});\n//Intrim solution\nIf(\n    dd_requesttype.Selected.Value = \"Custom Planning\",\n    UpdateContext({requesttypeCustom: true}),\n    UpdateContext({requesttypeCustom: false})\n);\n"
