Screens:
  HomeScreen:
    Properties:
      OnVisible: |
        =If(
            IsBlank(gblEnvironmentVariables),
            Set(
                gblEnvironmentVariables,
                UKCustomsAppStart.Run()
            )
        );
        // if logged in user is elevated, set gblIsAdmin
        If(
            IsMatch(
                gblEnvironmentVariables.elevatedusers,
                Lower(User().Email),
                MatchOptions.Contains
            ),
            Set(
                gblIsAdmin,
                true
            ),
            Set(
                gblIsAdmin,
                false
            )
        );
    Children:
      - cnt_layout_hs:
          Control: GroupContainer@1.4.0
          Variant: AutoLayout
          Properties:
            Fill: =RGBA(245, 245, 245, 1)
            Height: =Parent.Height
            LayoutAlignItems: =LayoutAlignItems.Center
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =16
            PaddingBottom: =16
            PaddingLeft: =16
            PaddingRight: =16
            PaddingTop: =16
            Width: =Parent.Width
          Children:
            - cnt_header_hs:
                Control: GroupContainer@1.4.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  FillPortions: =0
                  Height: =75
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutMinHeight: =16
                  LayoutMinWidth: =16
                  PaddingBottom: =8
                  PaddingLeft: =8
                  PaddingRight: =8
                  PaddingTop: =8
